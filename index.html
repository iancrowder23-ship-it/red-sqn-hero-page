<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RED SQN | JSOC</title>
    <meta name="description" content="Premier simulation community focusing on authentic experiences.">
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<body>
    <!-- Fun Background Animation Elements -->
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <nav class="navbar">
        <a href="index.html" class="logo">
            <img src="logo.png" alt="Red Squadron Logo" class="nav-logo-img">
            <span class="nav-logo-text">Red Squadron</span>
        </a>
        <ul class="nav-links">
            <li><a href="#home" class="active">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="roster.html">Roster</a></li>
            <li><a href="operations.html">Operations</a></li>
        </ul>
        <a id="nav-enlist" href="#" target="_blank" class="btn-nav">Enlist Now</a>
    </nav>

    <header id="home" class="hero">
        <div class="hero-content">
            <div class="pill-badge">
                <span class="pulse-dot"></span> Joint Special Operations Command
            </div>
            <h1 class="reveal-text">RED <br><span class="gradient-text">SQUADRON</span></h1>
            <p class="fade-up-text">Join the premier simulation community. Authentic tactics. Cohesive teamwork.
                Unforgettable experiences.</p>
            <div class="hero-actions">
                <a href="about.html" class="btn-primary"><span>Get Started</span></a>
                <a id="discord-btn" href="#" target="_blank" class="btn-secondary">Join Discord</a>
            </div>
        </div>

        <div class="scroll-indicator">
            <span>Scroll</span>
            <div class="scroll-mouse">
                <div class="scroll-wheel"></div>
            </div>
        </div>
    </header>

    <!-- ===== ABOUT SECTION ===== -->
    <section id="about" class="about-section">
        <div class="content-box">
            <h2 class="reveal-text" style="font-size: clamp(2.2rem, 5vw, 3.5rem); margin-bottom: 1.5rem;">About <span class="gradient-text">Red Squadron</span></h2>
            <p id="about-text" class="fade-up-text" style="text-align: left; max-width: 100%; font-size: 1.05rem;"></p>
        </div>
    </section>

    <script src="data.js"></script>
    <script>
        // Wire discord links from data.js
        document.getElementById('discord-btn').href = DISCORD_LINK;
        document.getElementById('nav-enlist').href = DISCORD_LINK;

        // Populate about text from data.js
        document.getElementById('about-text').innerHTML = SITE_INFO.about;

        // Orb parallax
        document.addEventListener('mousemove', (e) => {
            const orbs = document.querySelectorAll('.orb');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            orbs[0].style.transform = `translate(${x * 60}px, ${y * 60}px)`;
            orbs[1].style.transform = `translate(${x * -60}px, ${y * -60}px)`;
        });

        // Update active nav dot as sections scroll into view
        const navSections = [
            { id: 'home',  link: document.querySelector('.nav-links a[href="#home"]') },
            { id: 'about', link: document.querySelector('.nav-links a[href="#about"]') },
        ];

        const allNavLinks = document.querySelectorAll('.nav-links a');

        const sectionObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const activeId = entry.target.id;
                    allNavLinks.forEach(a => a.classList.remove('active'));
                    const match = navSections.find(s => s.id === activeId);
                    if (match && match.link) match.link.classList.add('active');
                }
            });
        }, { threshold: 0.5 });

        navSections.forEach(s => {
            const el = document.getElementById(s.id);
            if (el) sectionObserver.observe(el);
        });
    </script>
</body>

</html>
