<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operations | Red Squadron</title>
    <meta name="description" content="After-action reports and operation logs of Red Squadron.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/operations.css">
    <link rel="icon" type="image/png" href="assets/favicon.png">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <nav class="navbar">
        <a href="index.html" class="logo">
            <img src="assets/logo.png" alt="Red Squadron Logo" class="nav-logo-img">
            <span class="nav-logo-text">Red Squadron</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="roster.html">Roster</a></li>
            <li><a href="operations.html" class="active">Operations</a></li>
        </ul>
        <div class="nav-actions" style="display: flex; gap: 1rem;">
            <a id="nav-auth" href="login.html" class="btn-secondary" style="padding: 0.5rem 1.5rem; text-decoration: none;">Login</a>
            <a id="nav-enlist" href="#" target="_blank" class="btn-nav">Enlist Now</a>
        </div>
    </nav>

    <main class="page-container">
        <div class="ops-header fade-in-up">
            <div class="badge" style="margin-bottom: 1.5rem;">
                <span class="badge-dot"></span> <span id="page-badge">After-Action Reports</span>
            </div>
            <h1 class="hero-title" style="font-size: clamp(3rem, 6vw, 5rem); margin: 0 0 1rem;">
                <span id="page-title-normal">Operations</span> <span class="text-gradient-accent" id="page-title-highlight">Log</span>
            </h1>
            <p class="hero-subtitle" id="page-subtitle">Classified mission records of Red Squadron.</p>
        </div>

        <div class="ops-feed fade-in-up delay-2" id="opsFeed">
            <!-- Posts rendered by JS -->
        </div>
    </main>

    <script>
        const DISCORD_LINK = "https://discord.gg/your-invite-link";
        document.getElementById('nav-enlist').href = DISCORD_LINK;

        // Check Auth state for Nav
        fetch('/api/auth/me').then(res => res.json()).then(data => {
            const authBtn = document.getElementById('nav-auth');
            if (data.loggedIn) {
                authBtn.innerText = 'Account';
                authBtn.href = 'account.html';
                authBtn.classList.remove('btn-secondary');
                authBtn.classList.add('btn-primary');
            }
        }).catch(e => console.error('Auth Check Error', e));

        fetch('/api/data/site_info').then(res => res.json()).then(SITE_INFO => {
            // Populate Header
            document.getElementById('page-badge').innerText = SITE_INFO.pageHeaders.operations.badge;
            document.getElementById('page-title-normal').innerText = SITE_INFO.pageHeaders.operations.titleNormal;
            document.getElementById('page-title-highlight').innerText = SITE_INFO.pageHeaders.operations.titleHighlight;
            document.getElementById('page-subtitle').innerText = SITE_INFO.pageHeaders.operations.subtitle;
        });

        // Parallax — drive CSS vars on root so it doesn't fight orbFloat animation
        document.addEventListener('mousemove', (e) => {
            const x = ((e.clientX / window.innerWidth)  - 0.5) * 24;
            const y = ((e.clientY / window.innerHeight) - 0.5) * 24;
            document.documentElement.style.setProperty('--parallax-x', `${x}px`);
            document.documentElement.style.setProperty('--parallax-y', `${y}px`);
        });

        function getStatusBadge(status) {
            const map = {
                success: { cls: 'status-op-success', label: '✓ Success' },
                failure: { cls: 'status-op-failure', label: '✗ Failed' },
                ongoing: { cls: 'status-op-ongoing', label: '● Ongoing' },
                classified: { cls: 'status-op-classified', label: '⬛ Classified' }
            };
            const s = map[status] || map.classified;
            return `<span class="op-status-badge ${s.cls}">${s.label}</span>`;
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');
            return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        const feed = document.getElementById('opsFeed');
        
        fetch('/api/data/operations').then(res => res.json()).then(OPERATIONS => {
            const sorted = [...OPERATIONS].sort((a, b) => new Date(b.date) - new Date(a.date));

            sorted.forEach((op, i) => {
                const tags = (op.tags || []).map(t => `<span class="op-tag">${t}</span>`).join('');
                const participants = (op.participants || []).map(p => `<span class="op-participant">${p}</span>`).join('');

                const card = document.createElement('article');
                card.className = 'op-card glass-panel fade-in-up';
                card.style.animationDelay = `${0.15 + (i * 0.1)}s`;
                
                card.innerHTML = `
                    <div class="op-card-header">
                        <div class="op-card-meta">
                            <span class="op-id">#${String(op.id).padStart(3, '0')}</span>
                            <span class="op-date">${formatDate(op.date)}</span>
                            <span class="op-theater">📍 ${op.theater}</span>
                        </div>
                        ${getStatusBadge(op.status)}
                    </div>

                    <div class="op-title-row">
                        <h2 class="op-title">${op.title}</h2>
                        <span class="op-type">${op.type}</span>
                    </div>

                    <div class="op-posted-by">
                        <img src="assets/logo.png" alt="" class="op-avatar" style="object-fit: cover;">
                        <div>
                            <span class="op-author">Posted by ${op.commanderCallsign}</span>
                            <span class="op-role">Commanding Officer</span>
                        </div>
                    </div>

                    <p class="op-summary">${op.summary}</p>

                    <details class="op-details-block">
                        <summary class="op-details-toggle">Full After-Action Report</summary>
                        <div class="op-details-body">${op.details}</div>
                    </details>

                    <div class="op-footer">
                        <div class="op-participants-wrap">
                            <span class="op-participants-label">Personnel</span>
                            <div class="op-participants">${participants}</div>
                        </div>
                        <div class="op-tags">${tags}</div>
                    </div>
                `;
                feed.appendChild(card);
            });
        });
    </script>
</body>
</html>
