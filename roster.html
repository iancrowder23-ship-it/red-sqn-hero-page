<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roster | Red Squadron</title>
    <meta name="description" content="Meet the operators of Red Squadron, Joint Special Operations Command.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/roster.css">
    <link rel="icon" type="image/png" href="assets/favicon.png">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <nav class="navbar">
        <a href="index.html" class="logo">
            <img src="assets/logo.png" alt="Red Squadron Logo" class="nav-logo-img">
            <span class="nav-logo-text">Red Squadron</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="roster.html" class="active">Roster</a></li>
            <li><a href="operations.html">Operations</a></li>
        </ul>
        <div class="nav-actions" style="display: flex; gap: 1rem;">
            <a id="nav-auth" href="login.html" class="btn-secondary" style="padding: 0.5rem 1.5rem; text-decoration: none;">Login</a>
            <a id="nav-enlist" href="#" target="_blank" class="btn-nav">Enlist Now</a>
        </div>
    </nav>

    <main class="page-container">
        <div class="roster-header fade-in-up">
            <div class="badge" style="margin-bottom: 1.5rem;">
                <span class="badge-dot"></span> <span id="page-badge">Active Personnel</span>
            </div>
            <h1 class="hero-title" style="font-size: clamp(3rem, 6vw, 5rem); margin: 0 0 1rem;">
                <span id="page-title-normal">Elite</span> <span class="text-gradient-accent" id="page-title-highlight">Roster</span>
            </h1>
            <p class="hero-subtitle" id="page-subtitle">Meet the operators executing high-stakes missions.</p>
        </div>

        <div class="roster-grid fade-in-up delay-2" id="roster-grid">
            <!-- Roster cards generated by JS -->
        </div>
    </main>

    <script>
        const DISCORD_LINK = "https://discord.gg/your-invite-link";
        document.getElementById('nav-enlist').href = DISCORD_LINK;

        // Check Auth state for Nav
        fetch('/api/auth/me').then(res => res.json()).then(data => {
            const authBtn = document.getElementById('nav-auth');
            if (data.loggedIn) {
                authBtn.innerText = 'Account';
                authBtn.href = 'account.html';
                authBtn.classList.remove('btn-secondary');
                authBtn.classList.add('btn-primary');
            }
        }).catch(e => console.error('Auth Check Error', e));

        fetch('/api/data/site_info').then(res => res.json()).then(SITE_INFO => {
            // Populate Header
            document.getElementById('page-badge').innerText = SITE_INFO.pageHeaders.roster.badge;
            document.getElementById('page-title-normal').innerText = SITE_INFO.pageHeaders.roster.titleNormal;
            document.getElementById('page-title-highlight').innerText = SITE_INFO.pageHeaders.roster.titleHighlight;
            document.getElementById('page-subtitle').innerText = SITE_INFO.pageHeaders.roster.subtitle;
        });

        // Parallax — drive CSS vars on root so it doesn't fight orbFloat animation
        document.addEventListener('mousemove', (e) => {
            const x = ((e.clientX / window.innerWidth)  - 0.5) * 24;
            const y = ((e.clientY / window.innerHeight) - 0.5) * 24;
            document.documentElement.style.setProperty('--parallax-x', `${x}px`);
            document.documentElement.style.setProperty('--parallax-y', `${y}px`);
        });

        // Calculate Time in Service
        function calculateTIS(startDate) {
            const start = new Date(startDate);
            const now = new Date();
            const diffTime = Math.abs(now - start);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays < 30) return `${diffDays} Days`;
            if (diffDays < 365) return `${Math.floor(diffDays / 30)} Months`;
            return `${(diffDays / 365).toFixed(1)} Years`;
        }

        // Render Roster
        const grid = document.getElementById('roster-grid');
        
        fetch('/api/data/roster').then(res => res.json()).then(ROSTER => {
            ROSTER.forEach((member, i) => {
                const statusClass = member.status === 'active' ? 'status-active' : 'status-reserve';
                const tis = calculateTIS(member.startDate);
                
                const certsHtml = (member.certifications || []).map(cert => 
                    `<span class="cert-tag">${cert}</span>`
                ).join('');

                const portraitHtml = member.portrait 
                    ? `<img src="${member.portrait}" alt="${member.callsign}" class="op-portrait">`
                    : `<div class="op-portrait-placeholder">
                        <div class="placeholder-initial">${member.callsign[0].toUpperCase()}</div>
                        <div class="placeholder-label">No Portrait</div>
                       </div>`;

                const card = document.createElement('div');
                card.className = 'operator-card glass-panel fade-in-up';
                card.style.animationDelay = `${0.1 + (i * 0.05)}s`;
                card.style.padding = '0';
                
                card.innerHTML = `
                    <div class="op-header">
                        ${portraitHtml}
                        <span class="op-badge ${statusClass}">${member.status}</span>
                    </div>

                    <div style="padding: 1.5rem 2rem 0;">
                        <h2 class="op-name">${member.callsign}</h2>
                        <div class="op-rank">${member.rank || '—'}</div>
                        <div class="op-role">${member.role || '—'}</div>
                    </div>

                    <div style="padding: 0 2rem;">
                        <div class="op-stats">
                            <div class="stat-box">
                                <span class="stat-label">MOS</span>
                                <span class="stat-val">${(member.mos || '—').split('—')[0].trim()}</span>
                            </div>
                            <div class="stat-box">
                                <span class="stat-label">Time In Service</span>
                                <span class="stat-val">${tis}</span>
                            </div>
                        </div>
                    </div>

                    <p class="op-bio" style="padding: 0 2rem;">${member.bio || ''}</p>

                    <div class="op-certs-container" style="padding: 0 2rem 2rem;">
                        <div class="op-certs-label">Certifications</div>
                        <div class="op-certs">
                            ${certsHtml}
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        });
    </script>
</body>
</html>
