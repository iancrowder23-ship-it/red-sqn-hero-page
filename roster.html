<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roster | Red Squadron</title>
    <meta name="description" content="Meet the operators of Red Squadron, Joint Special Operations Command.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/roster.css">
    <link rel="icon" type="image/png" href="assets/favicon.png">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <nav class="navbar">
        <a href="index.html" class="logo">
            <img src="assets/logo.png" alt="Red Squadron Logo" class="nav-logo-img">
            <span class="nav-logo-text">Red Squadron</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="roster.html" class="active">Roster</a></li>
            <li><a href="operations.html">Operations</a></li>
        </ul>
        <div class="nav-actions" style="display: flex; gap: 1rem;">
            <a id="nav-auth" href="login.html" class="btn-secondary" style="padding: 0.5rem 1.5rem; text-decoration: none;">Login</a>
            <a id="nav-enlist" href="#" target="_blank" class="btn-nav">Enlist Now</a>
        </div>
    </nav>

    <main class="page-container">
        <!-- Page Header -->
        <div class="roster-header fade-in-up">
            <div class="badge" style="margin-bottom: 1.5rem;">
                <span class="badge-dot"></span> <span id="page-badge">Active Personnel</span>
            </div>
            <h1 class="hero-title" style="font-size: clamp(3rem, 6vw, 5rem); margin: 0 0 1rem;">
                <span id="page-title-normal">Elite</span> <span class="text-gradient-accent" id="page-title-highlight">Roster</span>
            </h1>
            <p class="hero-subtitle" id="page-subtitle">Meet the operators executing high-stakes missions.</p>
        </div>

        <!-- Filter Tabs -->
        <div class="roster-filters fade-in-up delay-1">
            <button class="filter-tab active" data-filter="all" id="tab-all">
                All <span class="tab-count" id="count-all">0</span>
            </button>
            <button class="filter-tab tab-active" data-filter="active" id="tab-active">
                Active <span class="tab-count" id="count-active">0</span>
            </button>
            <button class="filter-tab tab-absent" data-filter="reserve" id="tab-reserve">
                Reserve / Absent <span class="tab-count" id="count-reserve">0</span>
            </button>
        </div>

        <!-- Roster Grid -->
        <div class="roster-grid fade-in-up delay-2" id="roster-grid">
            <div class="roster-empty" id="roster-empty">
                <div class="roster-empty-icon">👤</div>
                <h3>No operators in this category</h3>
            </div>
        </div>
    </main>

    <script>
        const DISCORD_LINK = "https://discord.gg/your-invite-link";
        document.getElementById('nav-enlist').href = DISCORD_LINK;

        // Auth state
        fetch('/api/auth/me').then(r => r.json()).then(data => {
            const btn = document.getElementById('nav-auth');
            if (data.loggedIn) {
                btn.innerText = 'Account';
                btn.href = 'account.html';
                btn.classList.replace('btn-secondary', 'btn-primary');
            }
        }).catch(e => console.error('Auth Check Error', e));

        // Site info
        fetch('/api/data/site_info').then(r => r.json()).then(INFO => {
            document.getElementById('page-badge').innerText        = INFO.pageHeaders.roster.badge;
            document.getElementById('page-title-normal').innerText = INFO.pageHeaders.roster.titleNormal;
            document.getElementById('page-title-highlight').innerText = INFO.pageHeaders.roster.titleHighlight;
            document.getElementById('page-subtitle').innerText     = INFO.pageHeaders.roster.subtitle;
        });

        // Parallax
        document.addEventListener('mousemove', e => {
            const x = ((e.clientX / window.innerWidth)  - 0.5) * 24;
            const y = ((e.clientY / window.innerHeight) - 0.5) * 24;
            document.documentElement.style.setProperty('--parallax-x', `${x}px`);
            document.documentElement.style.setProperty('--parallax-y', `${y}px`);
        });

        // Time in service
        function calculateTIS(startDate) {
            const diffDays = Math.ceil(Math.abs(new Date() - new Date(startDate)) / 86400000);
            if (diffDays < 30)  return `${diffDays} Days`;
            if (diffDays < 365) return `${Math.floor(diffDays / 30)} Months`;
            return `${(diffDays / 365).toFixed(1)} Years`;
        }

        // --- Filter Logic ---
        let currentFilter = 'all';
        const tabs = document.querySelectorAll('.filter-tab');

        function applyFilter(filter) {
            currentFilter = filter;
            tabs.forEach(t => {
                t.classList.toggle('active', t.dataset.filter === filter);
            });
            const cards = document.querySelectorAll('.operator-card');
            let visible = 0;
            cards.forEach(card => {
                const status = card.dataset.status;
                const show = filter === 'all' || status === filter;
                card.classList.toggle('hidden-by-filter', !show);
                if (show) visible++;
            });
            const empty = document.getElementById('roster-empty');
            empty.classList.toggle('visible', visible === 0);
        }

        tabs.forEach(tab => {
            tab.addEventListener('click', () => applyFilter(tab.dataset.filter));
        });

        // --- Render Roster ---
        const grid = document.getElementById('roster-grid');

        fetch('/api/data/roster').then(r => r.json()).then(ROSTER => {
            // Count for tab badges
            const counts = { all: ROSTER.length, active: 0, reserve: 0 };
            ROSTER.forEach(m => {
                if (m.status === 'active') counts.active++;
                else counts.reserve++;
            });
            document.getElementById('count-all').innerText    = counts.all;
            document.getElementById('count-active').innerText = counts.active;
            document.getElementById('count-reserve').innerText = counts.reserve;

            ROSTER.forEach((member, i) => {
                const statusClass  = member.status === 'active' ? 'status-active' : 'status-reserve';
                const statusLabel  = member.status === 'active' ? 'Active' : 'Reserve';
                const tis          = calculateTIS(member.startDate);
                const mosShort     = (member.mos || '—').split('—')[0].trim();

                const certsHtml = (member.certifications || []).length
                    ? (member.certifications || []).map(c => `<span class="cert-tag">${c}</span>`).join('')
                    : `<span class="cert-tag" style="opacity:0.45;">None on record</span>`;

                const portraitHtml = member.portrait
                    ? `<img src="${member.portrait}" alt="${member.callsign}" class="op-portrait">`
                    : `<div class="op-portrait-placeholder">
                            <div class="placeholder-initial">${member.callsign[0].toUpperCase()}</div>
                            <div class="placeholder-label">No Portrait</div>
                       </div>`;

                const card = document.createElement('div');
                card.className = 'operator-card glass-panel fade-in-up';
                card.dataset.status = member.status;
                card.style.animationDelay = `${0.1 + (i * 0.05)}s`;

                card.innerHTML = `
                    <!-- Portrait Banner -->
                    <div class="op-header">
                        ${portraitHtml}
                        <span class="op-badge ${statusClass}">${statusLabel}</span>
                    </div>

                    <!-- Card Body -->
                    <div class="op-body">
                        <!-- Identity -->
                        <div class="op-identity">
                            <h2 class="op-name">${member.callsign}</h2>
                            <div class="op-rank">${member.rank || '—'}</div>
                            <div class="op-role">${member.role || '—'}</div>
                        </div>

                        <!-- Stats -->
                        <div class="op-stats">
                            <div class="stat-box">
                                <span class="stat-label">MOS</span>
                                <span class="stat-val">${mosShort}</span>
                            </div>
                            <div class="stat-box">
                                <span class="stat-label">Time In Service</span>
                                <span class="stat-val">${tis}</span>
                            </div>
                        </div>

                        <!-- Bio -->
                        ${member.bio ? `<p class="op-bio">${member.bio}</p>` : ''}

                        <!-- Certs -->
                        <div class="op-certs-container">
                            <div class="op-certs-label">Certifications</div>
                            <div class="op-certs">${certsHtml}</div>
                        </div>
                    </div>
                `;

                grid.appendChild(card);
            });

            // Apply default filter after render
            applyFilter('all');
        });
    </script>
</body>
</html>
