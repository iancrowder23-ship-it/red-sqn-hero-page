<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | Red Squadron</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <style>
        .about-wrapper {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .manifesto-block {
            padding: 4rem;
            position: relative;
            overflow: hidden;
        }

        .manifesto-block::after {
            content: '';
            position: absolute;
            top: 0; right: 0; width: 150px; height: 150px;
            background: radial-gradient(circle, rgba(220, 38, 38, 0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .manifesto-content {
            font-size: 1.25rem;
            line-height: 1.9;
            color: var(--text-muted);
        }
        
        /* Drop cap for first paragraph */
        .manifesto-content > p:first-of-type::first-letter {
            float: left;
            font-size: 4.5rem;
            line-height: 0.8;
            padding-right: 0.5rem;
            font-family: var(--font-heading);
            font-weight: 800;
            color: var(--accent-red);
        }

        .manifesto-content > p {
            margin-bottom: 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-top: 3rem;
        }

        .stat-card {
            padding: 2rem;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 3rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .stat-card p {
            font-size: 0.9rem;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .manifesto-block { padding: 2rem; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <nav class="navbar">
        <a href="index.html" class="logo">
            <img src="assets/logo.png" alt="Red Squadron Logo" class="nav-logo-img">
            <span class="nav-logo-text">Red Squadron</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html" class="active">About</a></li>
            <li><a href="roster.html">Roster</a></li>
            <li><a href="operations.html">Operations</a></li>
        </ul>
        <div class="nav-actions" style="display: flex; gap: 1rem;">
            <a id="nav-auth" href="login.html" class="btn-secondary" style="padding: 0.5rem 1.5rem; text-decoration: none;">Login</a>
            <a id="nav-enlist" href="#" target="_blank" class="btn-nav">Enlist Now</a>
        </div>
    </nav>

    <main class="page-container">
        <div class="about-wrapper">
            <div class="ops-header fade-in-up">
                <div class="badge" style="margin-bottom: 1.5rem;">
                    <span class="badge-dot"></span> <span id="page-badge">The Manifesto</span>
                </div>
                <h1 class="hero-title" style="font-size: clamp(3rem, 6vw, 5rem); margin: 0 0 1rem;">
                    <span id="page-title-normal">About</span> <span class="text-gradient-accent" id="page-title-highlight">Us</span>
                </h1>
            </div>

            <div class="manifesto-block glass-panel fade-in-up delay-2">
                <div class="manifesto-content" id="about-text">
                    <!-- Loaded via data.js -->
                </div>
            </div>

            <div class="stats-grid fade-in-up delay-3" id="stats-grid">
                <!-- Loaded via data.js -->
            </div>
        </div>
    </main>

    <script>
        const DISCORD_LINK = "https://discord.gg/your-invite-link";
        document.getElementById('nav-enlist').href = DISCORD_LINK;

        // Check Auth state for Nav
        fetch('/api/auth/me').then(res => res.json()).then(data => {
            const authBtn = document.getElementById('nav-auth');
            if (data.loggedIn) {
                authBtn.innerText = 'Account';
                authBtn.href = 'account.html';
                authBtn.classList.remove('btn-secondary');
                authBtn.classList.add('btn-primary');
            }
        }).catch(e => console.error('Auth Check Error', e));

        fetch('/api/data/site_info').then(res => res.json()).then(SITE_INFO => {
            // Populate Header
            document.getElementById('page-badge').innerText = SITE_INFO.pageHeaders.about.badge;
            document.getElementById('page-title-normal').innerText = SITE_INFO.pageHeaders.about.titleNormal;
            document.getElementById('page-title-highlight').innerText = SITE_INFO.pageHeaders.about.titleHighlight;

            // Parse the about text. It might have <br><br> tags. We'll wrap them in <p> tags for better styling.
            const rawAbout = SITE_INFO.about;
            const paragraphs = rawAbout.split('<br><br>').map(p => `<p>${p.trim()}</p>`).join('');
            document.getElementById('about-text').innerHTML = paragraphs;

            // Populate Stats
            const statsGrid = document.getElementById('stats-grid');
            let statsHtml = '';
            SITE_INFO.stats.forEach(stat => {
                statsHtml += `
                    <div class="stat-card glass-panel">
                        <h3>${stat.value}</h3>
                        <p>${stat.label}</p>
                    </div>
                `;
            });
            statsGrid.innerHTML = statsHtml;
        });

        // Parallax — drive CSS vars on root so it doesn't fight orbFloat animation
        document.addEventListener('mousemove', (e) => {
            const x = ((e.clientX / window.innerWidth)  - 0.5) * 24;
            const y = ((e.clientY / window.innerHeight) - 0.5) * 24;
            document.documentElement.style.setProperty('--parallax-x', `${x}px`);
            document.documentElement.style.setProperty('--parallax-y', `${y}px`);
        });
    </script>
</body>
</html>
